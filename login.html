<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login - MioBrand</title>
    <style>
        /* Stesso stile di signup.html */
        body { font-family: 'Helvetica Neue', Arial; background: linear-gradient(135deg, #5a009e, #8a2be2); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; }
        .btn { width: 100%; padding: 12px; background: #ffb6ff; color: #4b0082; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        a { color: #ffb6ff; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Bentornato</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn" onclick="login()">Accedi</button>
        <p style="margin-top:15px;"><a href="signup.html">Non hai un account? Registrati</a></p>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const response = await fetch('http://localhost:5500/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });
            const data = await response.json();
            if(data.token) {
                localStorage.setItem('token', data.token); // Salviamo il pass
                window.location.href = "index.html"; // Vai alla dashboard
            } else {
                alert("Email o password errati.");
            }
        }
    </script>
</body>
</html>
