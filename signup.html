<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registrati - MioBrand</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* Stesso stile viola che abbiamo usato prima */
        body { font-family: 'Helvetica Neue', Arial; background: linear-gradient(135deg, #5a009e, #8a2be2); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; }
        .btn { width: 100%; padding: 12px; background: #ffb6ff; color: #4b0082; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        a { color: #ffb6ff; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Crea Account</h2>
        <p>Inizia a monitorare il tuo umore</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn" onclick="register()">Registrati</button>
        <p style="margin-top:15px;"><a href="login.html">Hai già un account? Accedi</a></p>
    </div>

    <script>
        async function register() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const response = await fetch('http://localhost:5500/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });
            if(response.ok) {
                alert("Registrazione completata!");
                window.location.href = "login.html";
            } else {
                alert("Errore: email già esistente o dati mancanti.");
            }
        }
    </script>
</body>
</html>
